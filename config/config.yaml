server:
  grpc_port: ":50051"
  max_concurrent_scans: 10

nsq:
  nsqd_addresses:
    - "nsqd:4150"
  topic: "threat_scan"
  channel: "scanner"
  max_in_flight: 100

scanning:
  upload_path: "/uploads"
  max_file_size: 104857600  # 100MB
  scan_timeout: 300         # 5 minutes

logging:
  level: "debug"
  format: "json"
